<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خالتي إيمان 💙</title><style>
body{
    margin:0;
    font-family:"Tahoma", sans-serif;
    background:radial-gradient(circle at center,#0f172a,#020617);
    color:white;
    overflow:hidden;
}

.page{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    opacity:0;
    transition:1.2s cubic-bezier(.77,0,.18,1);
    padding:40px;
    box-sizing:border-box;
}

.page.active{
    left:0;
    opacity:1;
}

.page.exit{
    left:-100%;
    opacity:0;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

p{
    text-align:center;
    line-height:2;
    font-size:18px;
}

.btn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#2563eb;
    padding:12px 30px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 0 20px #3b82f6;
}

/* شخصية */
.character{
    position:fixed;
    bottom:0;
    right:20px;
    font-size:80px;
    animation:floatChar 3s ease-in-out infinite;
}

@keyframes floatChar{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
}

/* فقاعة الكلام */
.speech{
    position:fixed;
    bottom:120px;
    right:20px;
    background:white;
    color:black;
    padding:15px;
    border-radius:15px;
    max-width:250px;
    font-size:14px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* قلوب */
.heart{
    position:absolute;
    color:#60a5fa;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh); opacity:0}
    to{transform:translateY(-10vh); opacity:1}
}

</style></head><body><div class="page active">
<h1>إلى خالتي إيمان 💙</h1>
<p>
هذا حسين يحب يكلك هالكلام من قلبه...<br>
إنتِ مو بس أم... إنتِ وطن وأمان 💙
</p>
</div><div class="page">
<h1>عظمتك 🌸</h1>
<p>
يا امرأةً عظيمةً... يا من جعلتِ من الصبر قوة،<br>
ومن التعب نوراً للآخرين.
</p>
</div><div class="page">
<h1>دعاء 🤍</h1>
<p>
أسأل الله أن يوفقك ويجزيك الخير كله،<br>
ويأخذ حقك من كل ظالم.
</p>
</div><div class="btn" onclick="nextPage()">التالي</div><div class="character">👩‍🦰</div>
<div class="speech" id="speech"></div><script>
let pages = document.querySelectorAll('.page');
let index = 0;

function nextPage(){
    pages[index].classList.remove('active');
    pages[index].classList.add('exit');

    index = (index + 1) % pages.length;

    pages[index].classList.add('active');
    pages[index].classList.remove('exit');

    speak();
}

// نظام كلام الشخصية
let texts = [
"ترى حسين كاتب هذا الكلام من قلبه 💙",
"إنتِ امرأة عظيمة فعلاً 🌸",
"مكانتك كبيرة وما تنوصف 🤍",
"الله يحفظك ويخليك للجميع ✨"
];

let tIndex = 0;
let speech = document.getElementById('speech');

function speak(){
    let text = texts[tIndex];
    speech.innerHTML = "";
    let i = 0;

    let typing = setInterval(()=>{
        speech.innerHTML += text[i];
        i++;
        if(i >= text.length) clearInterval(typing);
    },40);

    tIndex = (tIndex + 1) % texts.length;
}

speak();

// قلوب
for(let i=0;i<25;i++){
    let heart = document.createElement('div');
    heart.innerHTML = '💙';
    heart.classList.add('heart');
    heart.style.left = Math.random()*100+'%';
    heart.style.fontSize = (10+Math.random()*20)+'px';
    heart.style.animationDuration = (3+Math.random()*5)+'s';
    document.body.appendChild(heart);
}
</script></body>
</html>
